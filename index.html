<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✈️ TravelBlog AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0d1b2a;
      --ink:    #1a2e42;
      --gold:   #c9913a;
      --amber:  #e8b86d;
      --sand:   #f7efe3;
      --cream:  #fdfaf5;
      --white:  #ffffff;
      --muted:  #8a9ab0;
      --radius: 14px;
      --shadow: 0 8px 32px rgba(13,27,42,.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── MAP TEXTURE BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(201,145,58,.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(13,27,42,.06) 0%, transparent 50%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23c9913a' stroke-width='0.3' opacity='0.18'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3Ccircle cx='30' cy='30' r='10'/%3E%3Cline x1='0' y1='30' x2='60' y2='30'/%3E%3Cline x1='30' y1='0' x2='30' y2='60'/%3E%3C/g%3E%3C/svg%3E");
      background-size: auto, auto, 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      background: linear-gradient(135deg, var(--navy) 0%, var(--ink) 100%);
      padding: 40px 24px 36px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(13,27,42,.3);
      overflow: visible;
    }

    .header-eyebrow {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--amber);
      font-weight: 500;
      margin-bottom: 10px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--white);
      line-height: 1.2;
    }

    header h1 span {
      color: var(--amber);
      font-style: italic;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
    }

    /* ── MAIN CONTAINER ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 36px 20px 80px;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 24px;
      border: 1px solid rgba(201,145,58,.1);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--navy);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--amber), transparent);
    }

    /* ── SETTINGS BUTTON IN HEADER ── */
    .header-settings {
      position: absolute;
      top: 16px;
      right: 20px;
    }

    .btn-settings {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: var(--amber);
      padding: 7px 14px;
      border-radius: 20px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-settings:hover { background: rgba(255,255,255,.18); }

    .btn-settings .key-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4caf82;
      display: none;
    }

    .btn-settings .key-dot.show { display: block; }

    /* ── API KEY PANEL (collapsible) ── */
    #apiPanel {
      overflow: hidden;
      max-height: 0;
      transition: max-height .4s ease, opacity .3s ease, margin .3s ease;
      opacity: 0;
      margin-bottom: 0;
    }

    #apiPanel.open {
      max-height: 400px;  /* 충분히 크게 */
      opacity: 1;
      margin-bottom: 24px;
    }

    /* ── API KEY SECTION ── */
    .api-row {
      display: flex;
      flex-direction: column;  /* 항상 세로 배치 */
      gap: 10px;
    }

    .api-row input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #dde3eb;
      border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: var(--sand);
      transition: border-color .2s;
      outline: none;
    }

    .api-row input:focus { border-color: var(--gold); background: var(--white); }

    .api-btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, var(--gold), var(--amber));
      color: var(--white);
    }

    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--gold);
      border: 1.5px solid var(--gold);
    }

    .btn-ghost:hover { background: rgba(201,145,58,.08); }

    .api-status {
      margin-top: 10px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ccc;
    }

    .dot.saved { background: #4caf82; }

    /* ── SEARCH SECTION ── */
    .search-wrap {
      display: flex;
      gap: 10px;
      position: relative;
    }

    .search-input {
      flex: 1;
      padding: 16px 20px;
      border: 2px solid #dde3eb;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      color: var(--ink);
      background: var(--sand);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .search-input:focus {
      border-color: var(--gold);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(201,145,58,.12);
    }

    .search-input::placeholder { color: var(--muted); }

    .btn-generate {
      padding: 16px 28px;
      font-size: 16px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .plane-icon {
      display: inline-block;
      transition: transform .3s;
    }

    .btn-generate:hover .plane-icon { transform: translateX(4px) rotate(-15deg); }

    /* ── LOADING ── */
    #loading {
      display: none;
      text-align: center;
      padding: 48px 0;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(201,145,58,.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 14px;
      color: var(--muted);
    }

    .loading-text span {
      display: inline-block;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loading-text span:nth-child(2) { animation-delay: .2s; }
    .loading-text span:nth-child(3) { animation-delay: .4s; }

    @keyframes pulse { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }

    /* ── RESULTS ── */
    #results { display: none; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .result-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--navy);
    }

    .destination-badge {
      background: linear-gradient(135deg, var(--navy), var(--ink));
      color: var(--amber);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .5px;
    }

    /* ── IMAGE ── */
    .image-section {
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
      position: relative;
      background: var(--sand);
    }

    .image-section img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }

    .image-section:hover img { transform: scale(1.02); }

    .image-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: linear-gradient(transparent, rgba(13,27,42,.6));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .image-credit {
      font-size: 11px;
      color: rgba(255,255,255,.7);
    }

    .btn-img-link {
      font-size: 11px;
      color: var(--amber);
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-img-link:hover { text-decoration: underline; }

    /* IMAGE FALLBACK */
    .image-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .image-link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--sand);
      border-radius: 8px;
      text-decoration: none;
      color: var(--ink);
      font-size: 13px;
      transition: background .2s;
      border: 1px solid rgba(201,145,58,.15);
    }

    .image-link-item:hover { background: rgba(201,145,58,.1); }

    .image-link-item .img-icon { font-size: 16px; }

    .image-link-item .img-url {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--gold);
      font-family: monospace;
      font-size: 12px;
    }

    /* ── TEXT BLOCK ── */
    .block-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 12px;
    }

    .text-content {
      background: var(--sand);
      border-radius: 10px;
      padding: 20px;
      font-size: 15px;
      line-height: 1.85;
      color: var(--ink);
      border-left: 3px solid var(--amber);
      position: relative;
    }

    .char-count {
      text-align: right;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* ── HASHTAGS ── */
    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: rgba(13,27,42,.06);
      color: var(--navy);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 400;
      border: 1px solid rgba(13,27,42,.1);
      transition: all .2s;
    }

    .tag:hover {
      background: var(--navy);
      color: var(--amber);
      border-color: var(--navy);
    }

    /* ── COPY BUTTON ── */
    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .btn-copy {
      padding: 7px 14px;
      font-size: 12px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(201,145,58,.1);
      color: var(--gold);
      border: 1px solid rgba(201,145,58,.3);
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-copy:hover { background: rgba(201,145,58,.2); }
    .btn-copy.copied { background: rgba(76,175,130,.12); color: #4caf82; border-color: #4caf82; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── ERROR ── */
    .error-box {
      background: #fff5f5;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 16px 20px;
      color: #c0392b;
      font-size: 14px;
      display: none;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .search-wrap { flex-direction: column; }
      .btn-generate { justify-content: center; }
      .image-section img { height: 200px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-settings">
    <button class="btn-settings" onclick="toggleApiPanel()" id="settingsBtn">
      <span class="key-dot" id="keyDotHeader"></span>
      ⚙️ API 설정
    </button>
  </div>
  <div class="header-eyebrow">AI-Powered Travel Writing</div>
  <h1>Travel<span>Blog</span> AI ✈️</h1>
  <p>여행지를 입력하면 블로그 글 · 이미지 · 해시태그를 자동으로 생성해드립니다</p>
</header>

<main>

  <!-- API KEY PANEL (collapsible) -->
  <div id="apiPanel">
    <div class="card">
      <div class="card-title">🔑 Gemini API 설정</div>
      <div class="api-row">
        <input type="password" id="apiKeyInput" placeholder="Gemini API Key를 입력하세요" />
        <div class="api-btn-row">
          <button class="btn btn-primary" onclick="saveApiKey()">저장</button>
          <button class="btn btn-ghost" onclick="clearApiKey()">초기화</button>
        </div>
      </div>
      <div class="api-status">
        <div class="dot" id="apiDot"></div>
        <span id="apiStatusText" style="font-size:12px; color:var(--muted);">API Key를 입력해주세요</span>
      </div>
    </div>
  </div>

  <!-- SEARCH CARD -->
  <div class="card">
    <div class="card-title">🗺️ 여행지 입력</div>
    <div class="search-wrap">
      <input
        class="search-input"
        type="text"
        id="destinationInput"
        placeholder="예: 교토, 산토리니, 제주도, 파리..."
        onkeydown="if(event.key==='Enter') generate()"
      />
      <button class="btn btn-primary btn-generate" onclick="generate()">
        <span class="plane-icon">✈️</span> 생성하기
      </button>
    </div>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorBox"></div>

  <!-- LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">
      여행의 이야기를 담고 있어요<span>.</span><span>.</span><span>.</span>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results">

    <!-- HEADER -->
    <div class="result-header">
      <h2>생성 결과</h2>
      <div class="destination-badge" id="resultBadge">—</div>
    </div>

    <!-- IMAGE CARD -->
    <div class="card" id="imageCard">
      <div class="card-title">🖼️ 추천 이미지</div>
      <div id="imageDisplay"></div>
    </div>

    <!-- BLOG TEXT CARD -->
    <div class="card">
      <div class="section-row">
        <div class="block-label">📝 블로그 텍스트</div>
        <button class="btn-copy" id="copyTextBtn" onclick="copyText()">
          📋 복사
        </button>
      </div>
      <div class="text-content" id="blogText">—</div>
      <div class="char-count" id="charCount">0자</div>
    </div>

    <!-- HASHTAG CARD -->
    <div class="card">
      <div class="section-row">
        <div class="block-label">🏷️ 해시태그</div>
        <button class="btn-copy" id="copyTagBtn" onclick="copyTags()">
          📋 복사
        </button>
      </div>
      <div class="tags-wrap" id="hashtagsWrap"></div>
    </div>

  </div>
</main>

<footer>TravelBlog AI · Powered by Gemini API · GitHub Pages에서 실행 가능</footer>

<div id="toast">✅ 클립보드에 복사되었습니다!</div>

<script>
  /* ── CONSTANTS ── */
  const STORAGE_KEY = 'travelblog_gemini_key';
  const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

  /* ── API KEY MANAGEMENT ── */
  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { showError('API Key를 입력해주세요.'); return; }
    localStorage.setItem(STORAGE_KEY, key);
    updateApiStatus(true);
    showToast('🔑 API Key가 저장되었습니다!');
    // 저장 후 패널 자동으로 접기
    closeApiPanel();
  }

  function clearApiKey() {
    localStorage.removeItem(STORAGE_KEY);
    document.getElementById('apiKeyInput').value = '';
    updateApiStatus(false);
    showToast('🗑️ API Key가 초기화되었습니다.');
    // 초기화 후 패널 열어두기
    openApiPanel();
  }

  function getApiKey() {
    return localStorage.getItem(STORAGE_KEY) || '';
  }

  function toggleApiPanel() {
    const panel = document.getElementById('apiPanel');
    if (panel.classList.contains('open')) {
      closeApiPanel();
    } else {
      openApiPanel();
    }
  }

  function openApiPanel() {
    document.getElementById('apiPanel').classList.add('open');
  }

  function closeApiPanel() {
    document.getElementById('apiPanel').classList.remove('open');
  }

  function updateApiStatus(saved) {
    const dot = document.getElementById('apiDot');
    const text = document.getElementById('apiStatusText');
    const headerDot = document.getElementById('keyDotHeader');
    if (saved) {
      dot.className = 'dot saved';
      text.textContent = 'API Key 저장됨 ✓';
      text.style.color = '#4caf82';
      headerDot.classList.add('show');  // 헤더 버튼에 초록 점 표시
    } else {
      dot.className = 'dot';
      text.textContent = 'API Key를 입력해주세요';
      text.style.color = 'var(--muted)';
      headerDot.classList.remove('show');
    }
  }

  /* ── ON LOAD ── */
  window.addEventListener('DOMContentLoaded', () => {
    const saved = getApiKey();
    if (saved) {
      // 키가 이미 저장돼 있으면 → 입력란에 채우고 패널 닫힌 채로 시작
      document.getElementById('apiKeyInput').value = saved;
      updateApiStatus(true);
      closeApiPanel();  // 패널 닫힌 상태
    } else {
      // 키 없으면 → 패널 열어서 입력 유도
      openApiPanel();
    }
  });

  /* ── MAIN GENERATE ── */
  async function generate() {
    const destination = document.getElementById('destinationInput').value.trim();
    if (!destination) { showError('여행지를 입력해주세요!'); return; }

    const apiKey = getApiKey();
    if (!apiKey) { showError('먼저 Gemini API Key를 저장해주세요.'); return; }

    hideError();
    showLoading(true);
    hideResults();

    try {
      const prompt = buildPrompt(destination);
      const data = await callGemini(apiKey, prompt);
      const parsed = parseResponse(data);
      renderResults(destination, parsed);
    } catch (e) {
      showError('오류가 발생했습니다: ' + e.message);
    } finally {
      showLoading(false);
    }
  }

  /* ── PROMPT BUILDER ── */
  function buildPrompt(destination) {
    return `당신은 여행을 좋아하는 평범한 사람입니다. AI가 쓴 글처럼 보이면 절대 안 됩니다.

"${destination}"을 다녀온 뒤 개인 블로그에 올릴 여행 기록을 써주세요.

[글쓰기 규칙 - 반드시 지킬 것]
- 실제로 그 장소를 직접 다녀온 사람처럼 1인칭 시점으로 쓸 것
- ~했다, ~이었다 같은 과거형 일기 문체 사용
- 거창한 수식어나 과장된 감탄 표현 금지 (황홀한, 눈부신, 형언할 수 없는 등 사용 안 함)
- 그 장소에서 실제로 겪을 법한 소소한 디테일 포함 (예: 줄 서서 기다린 것, 날씨가 애매했던 것, 생각보다 작았던 것 등)
- 문장은 짧고 담백하게. 호흡이 자연스럽게 끊기는 구어체 허용
- 결말을 억지로 예쁘게 마무리하지 말 것. 그냥 일상처럼 끝내도 됨
- 이모지는 1~2개만, 억지로 넣지 말고 어울릴 때만
- 500자 이내

아래 JSON 형식으로만 반환하세요. 다른 텍스트는 절대 포함하지 마세요.

{
  "blogText": "위 규칙을 따른 자연스러운 여행 기록문",
  "imageUrls": [
    "이 여행지 랜드마크/풍경의 실제 공개 이미지 URL 1개 (https:// 로 시작)",
    "두 번째 이미지 URL",
    "세 번째 이미지 URL"
  ],
  "hashtags": ["#해시태그1", "#해시태그2", "최소 12개 이상 한국어+영어 혼합"]
}

추가 주의사항:
- imageUrls는 https://로 시작하는 실제 접근 가능한 URL만
- hashtags는 최소 12개, 여행지 이름, 분위기, 음식, 액티비티 관련 태그 포함
- 반드시 유효한 JSON만 반환`;
  }

  /* ── GEMINI API CALL ── */
  async function callGemini(apiKey, prompt) {
    const res = await fetch(`${API_URL}?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.8, maxOutputTokens: 2048 }
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const json = await res.json();
    return json?.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  /* ── PARSE JSON RESPONSE ── */
  function parseResponse(raw) {
    const clean = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
    try {
      return JSON.parse(clean);
    } catch {
      // fallback: try to extract JSON block
      const match = clean.match(/\{[\s\S]*\}/);
      if (match) return JSON.parse(match[0]);
      throw new Error('응답 파싱에 실패했습니다. 다시 시도해주세요.');
    }
  }

  /* ── RENDER RESULTS ── */
  function renderResults(destination, data) {
    document.getElementById('resultBadge').textContent = destination;

    // ─ Blog Text ─
    const text = data.blogText || '텍스트 생성에 실패했습니다.';
    document.getElementById('blogText').textContent = text;
    document.getElementById('charCount').textContent = `${text.length}자`;

    // ─ Images ─
    renderImages(data.imageUrls || []);

    // ─ Hashtags ─
    const tags = data.hashtags || [];
    const wrap = document.getElementById('hashtagsWrap');
    wrap.innerHTML = '';
    tags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = tag;
      wrap.appendChild(span);
    });

    showResults();
  }

  function renderImages(urls) {
    const container = document.getElementById('imageDisplay');
    container.innerHTML = '';

    if (!urls || urls.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);font-size:14px;">이미지를 불러올 수 없습니다.</p>';
      return;
    }

    // Try to display the first image
    const img = document.createElement('div');
    img.className = 'image-section';
    img.innerHTML = `
      <img
        src="${escHtml(urls[0])}"
        alt="여행지 이미지"
        onerror="this.parentElement.style.display='none'"
        loading="lazy"
      />
      <div class="image-overlay">
        <span class="image-credit">📷 여행지 이미지</span>
        <a class="btn-img-link" href="${escHtml(urls[0])}" target="_blank" rel="noopener">
          원본 보기 ↗
        </a>
      </div>
    `;
    container.appendChild(img);

    // Show all URLs as links
    const list = document.createElement('div');
    list.className = 'image-list';
    list.style.marginTop = '12px';

    urls.forEach((url, i) => {
      const a = document.createElement('a');
      a.className = 'image-link-item';
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <span class="img-icon">🖼️</span>
        <span style="font-size:12px;color:var(--ink);min-width:60px;">이미지 ${i + 1}</span>
        <span class="img-url">${escHtml(url)}</span>
        <span style="font-size:11px;color:var(--muted);">↗</span>
      `;
      list.appendChild(a);
    });

    container.appendChild(list);
  }

  /* ── COPY FUNCTIONS ── */
  function copyText() {
    const text = document.getElementById('blogText').textContent;
    copyToClipboard(text, 'copyTextBtn', '📝 블로그 텍스트');
  }

  function copyTags() {
    const tags = [...document.querySelectorAll('#hashtagsWrap .tag')]
      .map(t => t.textContent).join(' ');
    copyToClipboard(tags, 'copyTagBtn', '🏷️ 해시태그');
  }

  function copyToClipboard(text, btnId, label) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(btnId);
      btn.classList.add('copied');
      btn.textContent = '✅ 복사됨';
      showToast(`${label} 복사 완료!`);
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '📋 복사';
      }, 2000);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast(`${label} 복사 완료!`);
    });
  }

  /* ── UI HELPERS ── */
  function showLoading(v) {
    document.getElementById('loading').style.display = v ? 'block' : 'none';
  }

  function showResults() {
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function hideResults() {
    document.getElementById('results').style.display = 'none';
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = '⚠️ ' + msg;
    box.style.display = 'block';
    box.scrollIntoView({ behavior: 'smooth' });
  }

  function hideError() {
    document.getElementById('errorBox').style.display = 'none';
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
